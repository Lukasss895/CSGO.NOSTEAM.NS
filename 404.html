<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Under Construction</title>
    <style>
        body {
            /* Rovnaké celoplošné pozadie ako na hlavnom webe */
            background-image: url('image_3dc3ea.png');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #0b0f14;
            
            color: #bdcbf4;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .container {
            width: 100%;
            max-width: 600px;
            background: rgba(11, 19, 31, 0.9);
            padding: 40px;
            border: 2px solid #253654;
            box-shadow: 0px 0px 30px rgba(0, 0, 0, 0.9);
            text-align: center;
            box-sizing: border-box;
            margin: 20px;
        }

        h1 {
            color: #e04b4b; /* Červená farba pre Error */
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 0;
            margin-bottom: 5px;
            font-size: 32px;
        }

        .coming-soon {
            color: #ffaa00; /* Oranžová pre výstrahu/prácu */
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 20px 0;
            animation: blink 1.5s infinite; /* Blikajúci efekt ako na starých weboch */
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        /* Panáčik s kladivom a káblami (štýlová vektorová grafika) */
        .worker-icon {
            width: 120px;
            height: 120px;
            fill: #4a90e2;
            margin: 20px auto;
        }

        .info-text {
            background: rgba(5, 8, 13, 0.9);
            padding: 15px;
            border-left: 3px solid #ffaa00;
            text-align: left;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .back-btn {
            display: inline-block;
            background: #1c2e43;
            color: #4a90e2;
            border: 1px solid #3a4b6e;
            padding: 10px 20px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 13px;
            transition: all 0.2s;
        }
        .back-btn:hover {
            background: #4a90e2;
            color: #fff;
            box-shadow: 0 0 10px rgba(74, 144, 226, 0.5);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>ERROR 404</h1>
        
        <svg class="worker-icon" viewBox="0 0 24 24">
            <path d="M12,2A2,2 0 0,1 14,4V5H10V4A2,2 0 0,1 12,2M12,6A4,4 0 0,1 16,10V12H8V10A4,4 0 0,1 12,6M5,22V20C5,17.34 8.13,15.2 12,15.2C15.87,15.2 19,17.34 19,20V22H5Z"/>
            <path d="M20,6H22V9H20V6M19,5H23V6H19V5M21,9H22V14H21V9M17,7H19V8H17V7Z" fill="#ffaa00"/>
            <path d="M3,11L5,9L7,12L9,8L11,13" stroke="#ffaa00" stroke-width="1.5" fill="none"/>
        </svg>

        <div class="coming-soon">🔧 COMING SOON 🔧</div>
        
        <div class="info-text">
            > Warning: Requested area is restricted or under construction.<br>
            > Our engineers are currently fixing the cables and hammering down the bugs.<br>
            > Please stand by or return to the base.
        </div>

        <a href="index.html" class="back-btn">Return to Main Page</a>
    </div>

</body>
</html>
